<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prepress Switch Monitor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .input-wrapper {
            display: flex;
            flex-direction: column;
        }
        
        .input-wrapper label {
            font-size: 13px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
        }
        
        .input-wrapper input,
        .input-wrapper select {
            padding: 10px 14px;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .input-wrapper input:focus,
        .input-wrapper select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .content {
            padding: 30px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card .label {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: #f8f9fa;
        }
        
        th {
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 700;
            color: #495057;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e9ecef;
        }
        
        td {
            padding: 14px 16px;
            font-size: 14px;
            color: #212529;
            border-bottom: 1px solid #e9ecef;
        }
        
        tbody tr:hover {
            background: #f8f9fa;
        }
        
        tbody tr:last-child td {
            border-bottom: none;
        }
        
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        
        .no-data svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }
        
        .duration-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #e7f3ff;
            color: #0066cc;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
        }
        
        .idle-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #fff3e0;
            color: #e65100;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔌 Prepress Switch Monitor Dashboard</h1>
            <p>Monitor and analyze switch activity duration</p>
        </div>
        
        <div class="controls">
            <div class="form-group">
                <div class="input-wrapper">
                    <label for="fromDate">From Date</label>
                    <input type="date" id="fromDate" required>
                </div>
                
                <div class="input-wrapper">
                    <label for="toDate">To Date</label>
                    <input type="date" id="toDate" required>
                </div>
                
                <div class="input-wrapper">
                    <label for="prepress">Prepress</label>
                    <select id="prepress" required>
                        <option value="2">Prepress 1</option>
                        <option value="3">Prepress 2</option>
                        <option value="4">Prepress 3</option>
                        <option value="5">Prepress 4</option>
                        <option value="6">Prepress 5</option>
                    </select>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="fetchData()">📊 Generate Report</button>
            </div>
        </div>
        
        <div class="content">
            <div id="stats" class="stats" style="display: none;">
                <div class="stat-card">
                    <div class="label">Total Sessions</div>
                    <div class="value" id="totalSessions">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">Total Active Time</div>
                    <div class="value" id="totalActive">0h 0m</div>
                </div>
                <div class="stat-card">
                    <div class="label">Total Idle Time</div>
                    <div class="value" id="totalIdle">0h 0m</div>
                </div>
            </div>
            
            <div id="messageContainer"></div>
            
            <div id="loadingContainer" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading data...</p>
            </div>
            
            <div id="tableContainer"></div>
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANT: Replace this URL with your Google Apps Script Web App URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEeM43_nS7fsntqp53ZvQ9ESv3m7L84bGEUVSb4VzXk62BcFceeS2Z453MAUDqdWIk/exec';
        
        // Initialize dates
        window.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            document.getElementById('fromDate').valueAsDate = yesterday;
            document.getElementById('toDate').valueAsDate = today;
        });
        
        async function fetchData() {
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            const prepress = document.getElementById('prepress').value;
            
            if (!fromDate || !toDate) {
                showMessage('Please select both From and To dates', 'error');
                return;
            }
            
            // Show loading
            document.getElementById('loadingContainer').style.display = 'block';
            document.getElementById('tableContainer').innerHTML = '';
            document.getElementById('messageContainer').innerHTML = '';
            document.getElementById('stats').style.display = 'none';
            
            try {
                // Build URL with query parameters
                const url = `${SCRIPT_URL}?action=getData&fromDate=${fromDate}&toDate=${toDate}&prepress=${prepress}`;
                
                console.log('Fetching from:', url);
                
                const response = await fetch(url);
                const text = await response.text();
                
                console.log('Response:', text);
                
                const result = JSON.parse(text);
                
                if (result.error) {
                    throw new Error(result.error);
                }
                
                displayData(result.data);
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Failed to fetch data: ' + error.message + '<br><br>Troubleshooting:<br>1. Make sure Google Apps Script is deployed as Web App<br>2. Access should be set to "Anyone"<br>3. Check browser console for details', 'error');
            } finally {
                document.getElementById('loadingContainer').style.display = 'none';
            }
        }
        
        function displayData(data) {
            const tableContainer = document.getElementById('tableContainer');
            
            if (!data || data.length === 0) {
                tableContainer.innerHTML = `
                    <div class="no-data">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                        </svg>
                        <h3>No Data Found</h3>
                        <p>No switch activity recorded for the selected date range and prepress.</p>
                    </div>
                `;
                return;
            }
            
            // Calculate statistics
            let totalSessions = data.length;
            let totalActiveMs = data.reduce((sum, item) => sum + (item.durationMs || 0), 0);
            let totalIdleMs = data.reduce((sum, item) => sum + (item.idleMs || 0), 0);
            
            document.getElementById('totalSessions').textContent = totalSessions;
            document.getElementById('totalActive').textContent = formatDuration(totalActiveMs);
            document.getElementById('totalIdle').textContent = formatDuration(totalIdleMs);
            document.getElementById('stats').style.display = 'grid';
            
            // Create table
            let html = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Time Closed From</th>
                                <th>Time Closed To</th>
                                <th>Duration</th>
                                <th>Idle</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            data.forEach((item, index) => {
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.closedFrom}</td>
                        <td>${item.closedTo}</td>
                        <td><span class="duration-badge">${item.duration}</span></td>
                        <td><span class="idle-badge">${item.idle || '-'}</span></td>
                    </tr>
                `;
            });
            
            html += `
                        </tbody>
                    </table>
                </div>
            `;
            
            tableContainer.innerHTML = html;
            showMessage('✅ Data loaded successfully! Found ' + totalSessions + ' sessions.', 'success');
        }
        
        function formatDuration(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            
            const h = hours % 24;
            const m = minutes % 60;
            
            if (days > 0) {
                return `${days}d ${h}h ${m}m`;
            } else if (hours > 0) {
                return `${h}h ${m}m`;
            } else {
                return `${m}m`;
            }
        }
        
        function showMessage(message, type) {
            const messageContainer = document.getElementById('messageContainer');
            messageContainer.innerHTML = `<div class="${type}">${message}</div>`;
        }
    </script>
</body>
</html>
